<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Inspire Entertainment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#fff8fc;
}

.background{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(100px);
animation:float 12s infinite ease-in-out;
}

.circle:nth-child(1){
width:350px;
height:350px;
background:#a855f7;
top:-100px;
left:-100px;
}

.circle:nth-child(2){
width:300px;
height:300px;
background:#ec4899;
right:-100px;
bottom:-100px;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(40px);}
100%{transform:translateY(0);}
}

.login-box{

width:420px;

background:rgba(255,255,255,.85);

backdrop-filter:blur(20px);

padding:40px;

border-radius:30px;

box-shadow:
0 20px 50px rgba(0,0,0,.1);

}

.logo{

text-align:center;

font-size:40px;

font-weight:800;

margin-bottom:15px;

background:linear-gradient(
45deg,
#a855f7,
#ec4899
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.subtitle{

text-align:center;

margin-bottom:30px;

color:#666;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-weight:500;

}

.input-group input{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#f3f4f6;

outline:none;

}

.login-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#a855f7;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

transform:translateY(-3px);

}

.links{

margin-top:20px;

text-align:center;

}

.links a{

text-decoration:none;

color:#a855f7;

font-weight:600;

}

.social{

margin-top:25px;

display:flex;

gap:10px;

}

.social button{

flex:1;

padding:12px;

border:none;

border-radius:12px;

cursor:pointer;

background:#f3f4f6;

}

.error{

margin-top:15px;

text-align:center;

color:red;

display:none;

}

</style>
</head>

<body>

<div class="background">
<div class="circle"></div>
<div class="circle"></div>
</div>

<div class="login-box">

<div class="logo">
INSPIRE
</div>

<p class="subtitle">
Entre na sua conta
</p>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input
type="email"
id="email"
required>
</div>

<div class="input-group">
<label>Senha</label>
<input
type="password"
id="password"
required>
</div>

<button
type="submit"
class="login-btn">

Entrar

</button>

<div
class="error"
id="error">

Email ou senha inválidos

</div>

</form>

<div class="links">

Não possui conta?

<a href="cadastro.html">

Cadastre-se

</a>

</div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

const email =
document
.getElementById("email")
.value;

const password =
document
.getElementById("password")
.value;

/*
Backend real:
fetch('/api/login')
*/

if(
email==="admin@inspire.com"
&&
password==="123456"
){

localStorage.setItem(
"user",
email
);

window.location.href=
"feed.html";

}else{

document
.getElementById("error")
.style.display="block";

}

});

</script>

</body>
</html>
