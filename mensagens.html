<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagens - Inspire Entertainment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{

    --primary:#a855f7;
    --secondary:#ec4899;
    --bg:#fff8fc;
    --card:#ffffff;
    --text:#222;
    --border:#ececec;

}

body{

    background:var(--bg);
    color:var(--text);

    height:100vh;

    overflow:hidden;

}

/* ==========================
BACKGROUND
========================== */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at top left,#d8b4fe 0%,transparent 35%),
    radial-gradient(circle at bottom right,#f9a8d4 0%,transparent 35%);

    opacity:.35;

    z-index:-1;

}

/* ==========================
LAYOUT
========================== */

.chat-container{

    display:flex;

    height:100vh;

}

/* ==========================
SIDEBAR
========================== */

.sidebar{

    width:360px;

    background:rgba(255,255,255,.9);

    backdrop-filter:blur(18px);

    border-right:1px solid var(--border);

    display:flex;

    flex-direction:column;

    transition:.35s;

}

.sidebar-header{

    padding:25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.sidebar-header h2{

    color:var(--primary);

    font-size:28px;

}

.search-box{

    padding:0 20px 20px;

}

.search-box input{

    width:100%;

    border:none;

    outline:none;

    background:#f4f4f5;

    padding:15px;

    border-radius:16px;

}

.contacts{

    flex:1;

    overflow-y:auto;

}

.contact{

    display:flex;

    align-items:center;

    gap:15px;

    padding:16px 20px;

    cursor:pointer;

    transition:.25s;

    border-left:4px solid transparent;

}

.contact:hover{

    background:#faf5ff;

}

.contact.active{

    background:#f3e8ff;

    border-left:4px solid var(--primary);

}

.contact img{

    width:58px;

    height:58px;

    border-radius:50%;

    object-fit:cover;

}

.contact-info{

    flex:1;

}

.contact-info h4{

    font-size:16px;

}

.contact-info p{

    font-size:13px;

    color:#777;

    margin-top:3px;

}

.online{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#22c55e;

}

/* ==========================
CHAT
========================== */

.chat{

    flex:1;

    display:flex;

    flex-direction:column;

}

.chat-header{

    height:85px;

    background:rgba(255,255,255,.9);

    backdrop-filter:blur(18px);

    display:flex;

    align-items:center;

    gap:15px;

    padding:0 25px;

    border-bottom:1px solid var(--border);

}

.chat-header img{

    width:55px;

    height:55px;

    border-radius:50%;

}

.chat-header h3{

    font-size:18px;

}

.chat-header p{

    font-size:13px;

    color:#22c55e;

}

.back-btn{

    display:none;

    font-size:26px;

    cursor:pointer;

    margin-right:5px;

}

/* ==========================
MENSAGENS
========================== */

.chat-messages{

    flex:1;

    overflow-y:auto;

    padding:25px;

    display:flex;

    flex-direction:column;

    gap:15px;

    scroll-behavior:smooth;

}

.message{

    max-width:72%;

    padding:15px 18px;

    border-radius:20px;

    animation:fade .25s;

}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(10px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

.received{

    background:white;

    align-self:flex-start;

    box-shadow:0 6px 20px rgba(0,0,0,.05);

}

.sent{

    background:linear-gradient(135deg,#a855f7,#c084fc);

    color:white;

    align-self:flex-end;

}
  /* ==========================
INPUT
========================== */

.chat-input{

    background:white;

    border-top:1px solid var(--border);

    padding:20px;

    display:flex;

    gap:12px;

    align-items:center;

}

.chat-input input{

    flex:1;

    border:none;

    outline:none;

    background:#f4f4f5;

    padding:16px 18px;

    border-radius:18px;

    font-size:15px;

}

.send-btn{

    border:none;

    background:linear-gradient(135deg,#a855f7,#c084fc);

    color:white;

    padding:15px 24px;

    border-radius:18px;

    cursor:pointer;

    transition:.3s;

    font-weight:600;

}

.send-btn:hover{

    transform:scale(1.05);

}

/* Scroll */

.contacts::-webkit-scrollbar,
.chat-messages::-webkit-scrollbar{

    width:8px;

}

.contacts::-webkit-scrollbar-thumb,
.chat-messages::-webkit-scrollbar-thumb{

    background:#ddd;

    border-radius:20px;

}

/* ==========================
MOBILE
========================== */

@media(max-width:900px){

.sidebar{

    width:100%;

    position:absolute;

    inset:0;

    z-index:100;

    transition:.35s;

}

.chat{

    width:100%;

}

.sidebar.hide{

    transform:translateX(-100%);

}

.chat.show{

    display:flex;

}

.back-btn{

    display:block;

}

.chat-header{

    padding:15px;

}

.chat-header img{

    width:45px;

    height:45px;

}

.chat-header h3{

    font-size:16px;

}

.chat-header p{

    font-size:12px;

}

.chat-messages{

    padding:18px;

}

.message{

    max-width:85%;

    font-size:14px;

}

.chat-input{

    padding:15px;

}

.chat-input input{

    padding:14px;

    font-size:14px;

}

.send-btn{

    padding:14px 18px;

}

.contact{

    padding:18px;

}

.contact img{

    width:52px;

    height:52px;

}

.sidebar-header{

    padding:20px;

}

.sidebar-header h2{

    font-size:24px;

}

}

/* Celulares pequenos */

@media(max-width:480px){

.sidebar-header h2{

    font-size:22px;

}

.search-box{

    padding:0 15px 15px;

}

.search-box input{

    padding:13px;

}

.contact{

    padding:15px;

}

.contact img{

    width:48px;

    height:48px;

}

.contact-info h4{

    font-size:15px;

}

.contact-info p{

    font-size:12px;

}

.chat-header{

    height:70px;

}

.chat-input{

    gap:8px;

}

.send-btn{

    padding:12px 15px;

}

}

</style>

</head>
<body>

<div class="chat-container">

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">

            <h2>Mensagens</h2>

        </div>

        <div class="search-box">

            <input
            type="text"
            id="searchInput"
            placeholder="Pesquisar conversas...">

        </div>

        <div class="contacts" id="contacts">

            <div class="contact active"
            onclick="openChat(0,this)">

                <img src="https://i.pravatar.cc/150?img=20">

                <div class="contact-info">

                    <h4>Luna Arts</h4>

                    <p>Online agora</p>

                </div>

                <div class="online"></div>

            </div>

            <div class="contact"
            onclick="openChat(1,this)">

                <img src="https://i.pravatar.cc/150?img=30">

                <div class="contact-info">

                    <h4>Anna Studios</h4>

                    <p>Visto há 5 min</p>

                </div>

            </div>

            <div class="contact"
            onclick="openChat(2,this)">

                <img src="https://i.pravatar.cc/150?img=35">

                <div class="contact-info">

                    <h4>Waltiny Wang</h4>

                    <p>Online</p>

                </div>

                <div class="online"></div>

            </div>

            <div class="contact"
            onclick="openChat(3,this)">

                <img src="https://i.pravatar.cc/150?img=42">

                <div class="contact-info">

                    <h4>Carla Design</h4>

                    <p>Digitando...</p>

                </div>

            </div>

            <div class="contact"
            onclick="openChat(4,this)">

                <img src="https://i.pravatar.cc/150?img=55">

                <div class="contact-info">

                    <h4>Gabriel Costa (Violinista)</h4>

                    <p>Ontem</p>

                </div>

            </div>

            <div class="contact"
            onclick="openChat(5,this)">

                <img src="https://i.pravatar.cc/150?img=58">

                <div class="contact-info">

                    <h4>Studio Pixel</h4>

                    <p>Há 2 horas</p>

                </div>

            </div>

        </div>

    </aside>

    <!-- CHAT -->

    <main class="chat" id="chat">

        <div class="chat-header">

            <span
            class="back-btn"
            onclick="backToContacts()">

                ←

            </span>

            <img
            id="chatAvatar"
            src="https://i.pravatar.cc/150?img=20">

            <div>

                <h3 id="chatName">

                    Luna Arts

                </h3>

                <p id="chatStatus">

                    Online

                </p>

            </div>

        </div>

        <div
        class="chat-messages"
        id="messages">

            <div class="message received">

                Olá! 👋

            </div>

            <div class="message sent">

                Oi Luna! Tudo bem?

            </div>

            <div class="message received">

                Tudo ótimo! 😊

            </div>

        </div>

        <div class="chat-input">

            <input
            id="messageInput"
            placeholder="Digite uma mensagem...">

            <button
            class="send-btn"
            onclick="sendMessage()">

                Enviar

            </button>

        </div>

    </main>

</div>
</body>
<script>

/* ==========================
   DADOS DAS CONVERSAS
========================== */

const conversations = [

{

name:"Luna Arts",

status:"Online",

avatar:"https://i.pravatar.cc/150?img=20",

messages:[

{
type:"received",
text:"Olá Marcos! 👋"
},

{
type:"sent",
text:"Oi Luna! Tudo bem?"
},

{
type:"received",
text:"Tudo ótimo 😊"
}

]

},

{

name:"Anna Studios",

status:"Visto há 5 min",

avatar:"https://i.pravatar.cc/150?img=25",

messages:[

{
type:"received",
text:"Você viu o roteiro novo?"
},

{
type:"sent",
text:"Vi sim, gostei bastante."
}

]

},

{

name:"Victor Hall",

status:"Online",

avatar:"https://i.pravatar.cc/150?img=35",

messages:[

{
type:"received",
text:"Vamos finalizar o projeto hoje?"
}

]

},

{

name:"Gabriel Costa",

status:"Digitando...",

avatar:"https://i.pravatar.cc/150?img=42",

messages:[

{
type:"received",
text:"Estou preparando as artes."
}

]

},

{

name:"Carla Design",

status:"Ontem",

avatar:"https://i.pravatar.cc/150?img=55",

messages:[

{
type:"received",
text:"Obrigada pela ajuda ❤️"
}

]

},

{

name:"Studio Pixel",

status:"Há 2 horas",

avatar:"https://i.pravatar.cc/150?img=58",

messages:[

{
type:"received",
text:"Seu convite foi aceito."
}

]

}

];

/* ==========================
   CONVERSA ATUAL
========================== */

let currentChat = 0;

/* ==========================
   ABRIR CONVERSA
========================== */

function openChat(index,element){

currentChat=index;

document
.querySelectorAll(".contact")
.forEach(c=>c.classList.remove("active"));

if(element){

element.classList.add("active");

}

const chat=conversations[index];

document.getElementById("chatName").innerText=
chat.name;

document.getElementById("chatStatus").innerText=
chat.status;

document.getElementById("chatAvatar").src=
chat.avatar;

renderMessages();

/* Mobile */

if(window.innerWidth<=900){

document
.getElementById("sidebar")
.classList.add("hide");

}

}

/* ==========================
   MOSTRAR MENSAGENS
========================== */

function renderMessages(){

const box=
document.getElementById("messages");

box.innerHTML="";

conversations[currentChat]
.messages
.forEach(msg=>{

const div=
document.createElement("div");

div.className=
"message "+msg.type;

div.innerText=
msg.text;

box.appendChild(div);

});

box.scrollTop=
box.scrollHeight;

}
/* ==========================
   ENVIAR MENSAGEM
========================== */

function sendMessage(){

    const input =
    document.getElementById("messageInput");

    const text =
    input.value.trim();

    if(text===""){
        return;
    }

    conversations[currentChat].messages.push({

        type:"sent",

        text:text

    });

    renderMessages();

    input.value="";

}

/* ==========================
   ENTER
========================== */

document
.getElementById("messageInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        sendMessage();

    }

});

/* ==========================
   PESQUISA
========================== */

document
.getElementById("searchInput")
.addEventListener("keyup",function(){

    const value =
    this.value.toLowerCase();

    const contatos =
    document.querySelectorAll(".contact");

    contatos.forEach(contato=>{

        const nome =
        contato.innerText.toLowerCase();

        if(nome.includes(value)){

            contato.style.display="flex";

        }else{

            contato.style.display="none";

        }

    });

});

/* ==========================
   VOLTAR (MOBILE)
========================== */

function backToContacts(){

    document
    .getElementById("sidebar")
    .classList.remove("hide");

}

/* ==========================
   RESIZE
========================== */

window.addEventListener("resize",()=>{

    if(window.innerWidth>900){

        document
        .getElementById("sidebar")
        .classList.remove("hide");

    }

});

/* ==========================
   ABRIR PRIMEIRA CONVERSA
========================== */

window.onload=function(){

    openChat(

        0,

        document.querySelector(".contact")

    );

};

</script>

</html>
