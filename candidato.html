<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candidatar-se | Inspire</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#fff7ff,#eef2ff,#edf8ff);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:40px;

overflow:auto;

}

.blur1{

position:fixed;

width:600px;

height:600px;

background:#8b5cf6;

filter:blur(170px);

opacity:.18;

top:-250px;

left:-200px;

border-radius:50%;

}

.blur2{

position:fixed;

width:550px;

height:550px;

background:#60a5fa;

filter:blur(170px);

opacity:.18;

bottom:-220px;

right:-180px;

border-radius:50%;

}

.container{

position:relative;

z-index:2;

width:900px;

max-width:100%;

background:rgba(255,255,255,.55);

backdrop-filter:blur(25px);

border-radius:35px;

padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,.08);

}

h1{

color:#7c3aed;

margin-bottom:10px;

}

.subtitle{

color:#666;

margin-bottom:30px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.input{

display:flex;

flex-direction:column;

}

.input label{

margin-bottom:8px;

font-weight:600;

}

.input input,

.input select,

.input textarea{

padding:14px;

border:none;

outline:none;

border-radius:16px;

background:white;

font-size:15px;

}

textarea{

height:140px;

resize:none;

}

.full{

grid-column:1/3;

}

button{

margin-top:30px;

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:#7c3aed;

color:white;

font-size:17px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.02);

}

.success{

display:none;

margin-top:25px;

background:#dcfce7;

color:#166534;

padding:18px;

border-radius:15px;

}

@media(max-width:800px){

.grid{

grid-template-columns:1fr;

}

.full{

grid-column:1;

}

}

</style>

</head>

<body>

<div class="blur1"></div>

<div class="blur2"></div>

<div class="container">

<h1>

✨ Candidate-se para a Inspire

</h1>

<p class="subtitle">

Mostre seu talento e faça parte da comunidade Inspire.

</p>

<form id="form">

<div class="grid">

<div class="input">

<label>Nome Completo</label>

<input
type="text"
id="nome"
required>

</div>

<div class="input">

<label>Nome Artístico</label>

<input
type="text"
id="artistico">

</div>

<div class="input">

<label>E-mail</label>

<input
type="email"
id="email"
required>

</div>

<div class="input">

<label>Categoria</label>

<select id="categoria">

<option>Ilustrador</option>

<option>Músico</option>

<option>Programador</option>

<option>Designer</option>

<option>Fotógrafo</option>

<option>Escritor</option>

<option>Cineasta</option>

<option>Outro</option>

</select>

</div>

<div class="input">

<label>Anos de Experiência</label>

<input
type="number"
id="experiencia">

</div>

<div class="input">

<label>Portfólio</label>

<input
type="url"
id="portfolio">

</div>

<div class="input full">

<label>Biografia</label>

<textarea
id="bio"
placeholder="Conte um pouco sobre você..."></textarea>

</div>

<div class="input full">

<label>Foto de Perfil</label>

<input
type="file"
id="foto">

</div>

<div class="input full">

<label>

<input
type="checkbox"
id="termos">

Aceito os termos da Inspire

</label>

</div>

</div>

<button>

Enviar candidatura

</button>

</form>

<div class="success" id="success">

🎉 Sua candidatura foi enviada com sucesso!

</div>

<script>

const form=document.getElementById("form");

form.addEventListener("submit",(e)=>{

e.preventDefault();

if(!document.getElementById("termos").checked){

alert("Aceite os termos.");

return;

}

document.getElementById("success").style.display="block";

form.reset();

window.scrollTo({

top:document.body.scrollHeight,

behavior:"smooth"

});

});

</script>

</div>

</body>

</html>
