<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurações • Inspire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#fdfbff,
#f3eeff,
#eef7ff);

height:100vh;

overflow:hidden;

}

.bg1{

position:fixed;

width:700px;
height:700px;

background:#8b5cf6;

filter:blur(180px);

opacity:.18;

top:-250px;
left:-250px;

border-radius:50%;

}

.bg2{

position:fixed;

width:650px;
height:650px;

background:#60a5fa;

filter:blur(180px);

opacity:.18;

bottom:-250px;
right:-250px;

border-radius:50%;

}

.container{

display:flex;

height:100vh;

position:relative;

z-index:2;

}

.sidebar{

width:260px;

background:rgba(255,255,255,.55);

backdrop-filter:blur(20px);

padding:30px;

display:flex;

flex-direction:column;

border-right:1px solid rgba(255,255,255,.4);

}

.logo{

font-size:30px;

font-weight:700;

color:#7c3aed;

margin-bottom:40px;

}

.menu{

display:flex;

flex-direction:column;

gap:15px;

}

.menu a{

text-decoration:none;

padding:15px;

border-radius:18px;

color:#444;

transition:.3s;

}

.menu a:hover{

background:white;

transform:translateX(5px);

}

.menu i{

width:25px;

color:#7c3aed;

}

.content{

flex:1;

overflow:auto;

padding:40px;

}

.title{

font-size:35px;

color:#7c3aed;

margin-bottom:30px;

}

.section{

background:white;

padding:25px;

border-radius:25px;

margin-bottom:25px;

box-shadow:0 15px 35px rgba(0,0,0,.08);

}

.section h2{

margin-bottom:20px;

color:#7c3aed;

}

.row{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.input{

display:flex;

flex-direction:column;

margin-bottom:18px;

}

.input label{

margin-bottom:8px;

font-weight:600;

}

.input input{

padding:14px;

border:none;

outline:none;

background:#f6f6ff;

border-radius:15px;

}

.switch{

display:flex;

justify-content:space-between;

align-items:center;

padding:15px 0;

border-bottom:1px solid #eee;

}

.switch input{

width:20px;

height:20px;

}

.save{

margin-top:25px;

padding:16px;

width:100%;

border:none;

background:#7c3aed;

color:white;

font-size:16px;

border-radius:18px;

cursor:pointer;

transition:.3s;

}

.save:hover{

transform:scale(1.02);

}

@media(max-width:900px){

.sidebar{

display:none;

}

.row{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="bg1"></div>

<div class="bg2"></div>

<div class="container">

<div class="sidebar">

<div class="logo">

INSPIRE

</div>

<div class="menu">

<a href="feed.html"><i class="fa-solid fa-house"></i> Feed</a>

<a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a>

<a href="artistas.html"><i class="fa-solid fa-palette"></i> Artistas</a>

<a href="inspire-ai.html"><i class="fa-solid fa-robot"></i> Inspire AI</a>

</div>

</div>

<div class="content">

<h1 class="title">

⚙️ Configurações

</h1>

<div class="section">

<h2>

Perfil

</h2>

<div class="row">

<div class="input">

<label>Nome</label>

<input
type="text"
value="Marcos Antônio">

</div>

<div class="input">

<label>Usuário</label>

<input
type="text"
value="@marcos">

</div>

<div class="input">

<label>Email</label>

<input
type="email"
value="marcos@email.com">

</div>

<div class="input">

<label>Telefone</label>

<input
type="text"
placeholder="(00) 00000-0000">

</div>

</div>

<button class="save">

Salvar Perfil

</button>

</div>

<div class="section">

<h2>

Preferências

</h2>

<div class="switch">

<span>🌙 Tema Escuro</span>

<input
type="checkbox"
id="darkMode">

</div>

<div class="switch">

<span>🔔 Receber Notificações</span>

<input
type="checkbox"
checked>

</div>

<div class="switch">

<span>🤖 Ativar Inspire AI</span>

<input
type="checkbox"
checked>

</div>

<div class="switch">

<span>📧 Receber novidades por e-mail</span>

<input
type="checkbox">

</div>
  </div>

<!-- ===========================
SEGURANÇA
=========================== -->

<div class="section">

<h2>

🔒 Segurança

</h2>

<div class="row">

<div class="input">

<label>Senha Atual</label>

<input
type="password"
id="currentPassword"
placeholder="Digite sua senha atual">

</div>

<div class="input">

<label>Nova Senha</label>

<input
type="password"
id="newPassword"
placeholder="Digite uma nova senha">

</div>

<div class="input">

<label>Confirmar Nova Senha</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirme a nova senha">

</div>

<div class="input">

<label>Idioma</label>

<select id="language">

<option value="pt-BR">Português (Brasil)</option>

<option value="en-US">English</option>

<option value="es-ES">Español</option>

</select>

</div>

</div>

<button class="save">

Salvar Segurança

</button>

</div>

<!-- ===========================
PRIVACIDADE
=========================== -->

<div class="section">

<h2>

🛡️ Privacidade

</h2>

<div class="switch">

<span>👀 Perfil Público</span>

<input
type="checkbox"
checked>

</div>

<div class="switch">

<span>💬 Permitir Mensagens</span>

<input
type="checkbox"
checked>

</div>

<div class="switch">

<span>📍 Mostrar Localização</span>

<input
type="checkbox">

</div>

<div class="switch">

<span>📈 Mostrar Estatísticas</span>

<input
type="checkbox"
checked>

</div>

</div>

<!-- ===========================
CONTA
=========================== -->

<div class="section">

<h2>

👤 Conta

</h2>

<button
class="save"
style="background:#2563eb;margin-bottom:15px;">

📥 Exportar meus dados

</button>

<button
class="save"
style="background:#dc2626;">

🗑️ Excluir Conta

</button>

</div>

</div>

</div>

<script>

// ==========================
// TEMA ESCURO
// ==========================

const darkMode=document.getElementById("darkMode");

if(localStorage.getItem("theme")==="dark"){

document.body.classList.add("dark");

darkMode.checked=true;

}

darkMode.addEventListener("change",()=>{

document.body.classList.toggle("dark");

localStorage.setItem(

"theme",

darkMode.checked ? "dark":"light"

);

});

// ==========================
// SALVAR CONFIGURAÇÕES
// ==========================

document.querySelectorAll(".save").forEach(btn=>{

btn.addEventListener("click",()=>{

alert("Configurações salvas com sucesso!");

});

});

// ==========================
// ALTERAR SENHA
// ==========================

document.querySelectorAll(".save")[1].onclick=()=>{

const atual=document.getElementById("currentPassword").value;

const nova=document.getElementById("newPassword").value;

const confirmar=document.getElementById("confirmPassword").value;

if(!atual || !nova || !confirmar){

alert("Preencha todos os campos.");

return;

}

if(nova!==confirmar){

alert("As senhas não coincidem.");

return;

}

alert("Senha alterada com sucesso!");

};

// ==========================
// EXCLUIR CONTA
// ==========================

document.querySelector(".save[style*='dc2626']").onclick=()=>{

if(confirm("Tem certeza que deseja excluir sua conta?")){

alert("Conta excluída.");

}

};

</script>

<style>

.dark{

background:#0f172a;

}

.dark .section{

background:#1e293b;

color:white;

}

.dark .input input,

.dark .input select{

background:#334155;

color:white;

}

.dark .sidebar{

background:#172033;

}

.dark .menu a{

color:white;

}

.dark .menu a:hover{

background:#334155;

}

.dark .title,

.dark .section h2{

color:#c084fc;

}

</style>

</body>

</html>
