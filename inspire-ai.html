<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspire AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

overflow:hidden;

background:
linear-gradient(
135deg,
#fff7fc,
#f4ecff,
#edf6ff
);

}

/*==========================
BACKGROUND
===========================*/

.bg1{

position:fixed;

width:600px;
height:600px;

background:#b983ff;

opacity:.18;

filter:blur(150px);

border-radius:50%;

top:-250px;
left:-150px;

animation:float1 8s ease infinite;

}

.bg2{

position:fixed;

width:500px;
height:500px;

background:#7dd3fc;

opacity:.15;

filter:blur(150px);

border-radius:50%;

bottom:-150px;
right:-100px;

animation:float2 10s ease infinite;

}

@keyframes float1{

0%{

transform:translateY(0);

}

50%{

transform:translateY(40px);

}

100%{

transform:translateY(0);

}

}

@keyframes float2{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-40px);

}

100%{

transform:translateY(0);

}

}

/*==========================
APP
===========================*/

.app{

display:flex;

height:100vh;

position:relative;

z-index:2;

}

/*==========================
SIDEBAR
===========================*/

.sidebar{

width:300px;

background:rgba(255,255,255,.55);

backdrop-filter:blur(25px);

border-right:1px solid rgba(255,255,255,.4);

display:flex;

flex-direction:column;

padding:25px;

}

.logo{

font-size:34px;

font-weight:700;

color:#7c3aed;

margin-bottom:35px;

}

.new-chat{

background:
linear-gradient(
45deg,
#7c3aed,
#c084fc
);

color:white;

border:none;

padding:15px;

border-radius:18px;

cursor:pointer;

font-size:16px;

transition:.35s;

}

.new-chat:hover{

transform:scale(1.04);

}

.search{

margin-top:20px;

}

.search input{

width:100%;

padding:14px;

border:none;

outline:none;

background:white;

border-radius:16px;

}

.history{

margin-top:30px;

overflow:auto;

flex:1;

}

.history-item{

padding:14px;

border-radius:15px;

cursor:pointer;

margin-bottom:10px;

background:rgba(255,255,255,.5);

transition:.3s;

}

.history-item:hover{

background:white;

transform:translateX(5px);

}

/*==========================
CHAT
===========================*/

.chat{

flex:1;

display:flex;

flex-direction:column;

}

.top{

height:80px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 40px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,.4);

}

.title{

font-size:28px;

font-weight:700;

color:#6d28d9;

}

.user{

display:flex;

align-items:center;

gap:15px;

}

.avatar{

width:45px;

height:45px;

border-radius:50%;

background:#7c3aed;

color:white;

display:flex;

justify-content:center;

align-items:center;

font-weight:700;

}

.messages{

flex:1;

padding:40px;

overflow:auto;

display:flex;

flex-direction:column;

gap:25px;

}

/*==========================
BUBBLES
===========================*/

.bot{

display:flex;

gap:15px;

align-items:flex-start;

}

.bot img{

width:50px;

height:50px;

border-radius:50%;

}

.bot-message{

background:white;

padding:22px;

border-radius:20px;

max-width:800px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

line-height:1.8;

}

.user-box{

display:flex;

justify-content:flex-end;

}

.user-message{

background:#7c3aed;

color:white;

padding:20px;

border-radius:20px;

max-width:750px;

}

/*==========================
INPUT
===========================*/

.bottom{

padding:25px;

background:rgba(255,255,255,.5);

backdrop-filter:blur(20px);

}

.input-area{

display:flex;

gap:15px;

background:white;

padding:15px;

border-radius:25px;

box-shadow:0 15px 30px rgba(0,0,0,.08);

}

.input-area textarea{

flex:1;

border:none;

resize:none;

outline:none;

font-size:16px;

height:45px;

}

.send{

width:60px;

border:none;

background:#7c3aed;

color:white;

font-size:22px;

border-radius:18px;

cursor:pointer;

transition:.3s;

}

.send:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="app">

<div class="sidebar">

<div class="logo">

INSPIRE AI

</div>

<button class="new-chat">

<i class="fa-solid fa-plus"></i>

Nova conversa

</button>

<div class="search">

<input
type="text"
placeholder="Pesquisar conversas">

</div>

<div class="history">

<div class="history-item">

💡 Ideias para curta-metragem

</div>

<div class="history-item">

🎨 Criar personagem

</div>

<div class="history-item">

💻 Explicar JavaScript

</div>

<div class="history-item">

🎵 Escrever letra de música

</div>

<div class="history-item">

📚 Resumir texto

</div>

</div>

</div>

<div class="chat">

<div class="top">

<div class="title">

Inspire AI

</div>

<div class="user">

<div class="avatar">

M

</div>

</div>

</div>

<div class="messages" id="messages">

<div class="bot">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<div class="bot-message">

<h2>Olá! 👋</h2>

<p>

Sou a Inspire AI.

Posso ajudar você com programação,
arte, design, escrita, estudos,
filmes, música e muito mais.

O que vamos criar hoje?

</p>

</div>

</div>
