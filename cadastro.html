<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Inspire Entertainment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#fff8fc;

overflow:hidden;

}

/* FUNDO */

.background{

position:fixed;

width:100%;
height:100%;

z-index:-1;

}

.circle{

position:absolute;

border-radius:50%;

filter:blur(100px);

animation:float 12s infinite ease-in-out;

}

.circle:nth-child(1){

width:350px;
height:350px;

background:#a855f7;

top:-100px;
left:-100px;

}

.circle:nth-child(2){

width:300px;
height:300px;

background:#ec4899;

right:-100px;
bottom:-100px;

}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(40px);
}

100%{
transform:translateY(0);
}

}

/* CARD */

.register-box{

width:500px;

background:rgba(255,255,255,.85);

backdrop-filter:blur(20px);

padding:40px;

border-radius:30px;

box-shadow:
0 20px 50px rgba(0,0,0,.1);

}

.logo{

text-align:center;

font-size:40px;

font-weight:800;

margin-bottom:10px;

background:linear-gradient(
45deg,
#a855f7,
#ec4899
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.subtitle{

text-align:center;

margin-bottom:25px;

color:#666;

}

.avatar{

display:flex;

justify-content:center;

margin-bottom:20px;

}

.avatar img{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #a855f7;

}

.avatar input{

display:none;

}

.avatar label{

cursor:pointer;

}

.input-group{

margin-bottom:15px;

}

.input-group label{

display:block;

margin-bottom:6px;

font-weight:500;

}

.input-group input{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#f3f4f6;

outline:none;

}

.register-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#a855f7;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.register-btn:hover{

transform:translateY(-3px);

}

.message{

margin-top:15px;

text-align:center;

display:none;

font-weight:600;

}

.success{

color:green;

}

.error{

color:red;

}

.links{

text-align:center;

margin-top:20px;

}

.links a{

text-decoration:none;

color:#a855f7;

font-weight:600;

}

@media(max-width:600px){

.register-box{

width:95%;

padding:25px;

}

}

</style>

</head>

<body>

<div class="background">

<div class="circle"></div>
<div class="circle"></div>

</div>

<div class="register-box">

<div class="logo">
INSPIRE
</div>

<p class="subtitle">

Crie sua conta gratuitamente

</p>

<form id="registerForm">

<div class="avatar">

<label>

<img
id="preview"
src="https://i.pravatar.cc/300?img=5">

<input
type="file"
accept="image/*"
id="avatarInput">

</label>

</div>

<div class="input-group">

<label>Nome Completo</label>

<input
type="text"
id="name"
required>

</div>

<div class="input-group">

<label>Nome de Usuário</label>

<input
type="text"
id="username"
required>

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="input-group">

<label>Senha</label>

<input
type="password"
id="password"
required>

</div>

<div class="input-group">

<label>Confirmar Senha</label>

<input
type="password"
id="confirmPassword"
required>

</div>

<button
type="submit"
class="register-btn">

Criar Conta

</button>

<div
id="success"
class="message success">

Conta criada com sucesso!

</div>

<div
id="error"
class="message error">

As senhas não coincidem.

</div>

</form>

<div class="links">

Já possui conta?

<a href="login.html">

Entrar

</a>

</div>

</div>

<script>

/* FOTO */

const avatarInput =
document.getElementById(
"avatarInput"
);

avatarInput.addEventListener(
"change",
function(){

const file =
this.files[0];

if(file){

const reader =
new FileReader();

reader.onload = function(e){

document
.getElementById("preview")
.src = e.target.result;

};

reader.readAsDataURL(file);

}

});

/* CADASTRO */

document
.getElementById("registerForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

const name =
document
.getElementById("name")
.value;

const username =
document
.getElementById("username")
.value;

const email =
document
.getElementById("email")
.value;

const password =
document
.getElementById("password")
.value;

const confirmPassword =
document
.getElementById("confirmPassword")
.value;

document
.getElementById("success")
.style.display="none";

document
.getElementById("error")
.style.display="none";

if(password !== confirmPassword){

document
.getElementById("error")
.style.display="block";

return;

}

/* Simulação */

const user = {

name,
username,
email,
password

};

localStorage.setItem(
"userData",
JSON.stringify(user)
);

document
.getElementById("success")
.style.display="block";

setTimeout(()=>{

window.location.href =
"login.html";

},2000);

});

</script>

</body>
</html>
